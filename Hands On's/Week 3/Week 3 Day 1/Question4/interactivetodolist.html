<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interactive To-Do List</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    display: flex;
    justify-content: center;
    padding-top: 50px;
}

.todo-container {
    background: white;
    width: 400px;
    padding: 20px;
    border-radius: 6px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
}

.input-group {
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 8px;
}

button {
    padding: 8px 12px;
    cursor: pointer;
    border: none;
    background: #007bff;
    color: white;
    border-radius: 4px;
}

ul {
    list-style: none;
    padding: 0;
    margin-top: 20px;
}

li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px;
    margin-bottom: 8px;
    background: #f1f1f1;
    border-radius: 4px;
}

.completed {
    text-decoration: line-through;
    color: gray;
}

.delete-btn {
    background: red;
    padding: 5px 8px;
    font-size: 12px;
}
.stats {
    margin-top: 15px;
    font-size: 14px;
}
</style>
</head>
<body>

<div class="todo-container">
    <h2>To-Do List</h2>

    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Enter new task">
        <button id="addTask">Add</button>
    </div>

    <ul id="taskList"></ul>

    <div class="stats">
        Total Tasks: <span id="totalCount">0</span><br>
        Completed Tasks: <span id="completedCount">0</span>
    </div>
</div>

<script>
$(document).ready(function() {

    function updateCounts() {
        var total = $("#taskList li").length;
        var completed = $("#taskList li.completed").length;

        $("#totalCount").text(total);
        $("#completedCount").text(completed);
    }

    $("#addTask").on("click", function() {

        var taskText = $("#taskInput").val().trim();

        if(taskText !== "") {

            $("#taskList").append(
                "<li>" +
                "<span class='task-text'>" + taskText + "</span>" +
                "<button class='delete-btn'>Delete</button>" +
                "</li>"
            );

            $("#taskInput").val("");
            updateCounts();
        }
    });

    $("#taskList").on("click", ".task-text", function() {
        $(this).parent().toggleClass("completed");
        updateCounts();
    });

    $("#taskList").on("click", ".delete-btn", function() {
        $(this).parent().remove();
        updateCounts();
    });

});
</script>

</body>
</html>
