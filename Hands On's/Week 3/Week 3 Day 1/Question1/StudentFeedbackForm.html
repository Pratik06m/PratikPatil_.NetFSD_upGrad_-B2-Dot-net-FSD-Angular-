<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Feedback Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h3 class="mb-4 text-center">Student Feedback Form</h3>

        <form id="feedbackForm">

            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" id="name" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Course Rating</label>
                <select id="rating" class="form-select">
                    <option value="">Select Rating</option>
                    <option>Excellent</option>
                    <option>Good</option>
                    <option>Average</option>
                    <option>Poor</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Comments</label>
                <textarea id="comments" class="form-control"></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Submit Feedback
            </button>

        </form>

        <div id="message" class="mt-3"></div>

    </div>
</div>


<script>
$(document).ready(function() {

    $("#feedbackForm").submit(function(event) {

        event.preventDefault();

        var name = $("#name").val().trim();
        var email = $("#email").val().trim();

        $("#message").html("");

        if(name === "" || email === "") {
            $("#message").html(
                '<div class="alert alert-danger">Please enter both Name and Email.</div>'
            );
        } else {

            $("#message").html(
                '<div class="alert alert-success">Thank you for your feedback!</div>'
            );

            $("#feedbackForm")[0].reset();
        }

    });

});
</script>

</body>
</html>
